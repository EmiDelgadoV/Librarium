services:
  - type: web
    name: librarium-api
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    plan: free
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true 
      - key: ALLOWED_HOSTS
        value: "librarium-api.onrender.com,localhost" 
      - key: DATABASE_URL
        fromDatabase:
          name: librarium-db
          property: connectionString

databases:
  - name: librarium-db
    plan: free