version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgres/data
    environment:
      - POSTGRES_DB=librarium_db
      - POSTGRES_USER=librarium_user
      - POSTGRES_PASSWORD=librarium_pass
    ports:
      - "5432:5432"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://librarium_user:librarium_pass@db:5432/librarium_db
    depends_on:
      - db

volumes:
  postgres_data: